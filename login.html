<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="cosmobot.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Login — CosmoBot</title>
</head>
<body>
  <div class="page">
    <canvas id="space-canvas" aria-hidden="true"></canvas>
    <div class="cyber-grid" aria-hidden="true"></div>

    <div class="page-center">
      <div class="page-heading">
        <a href="index.html" class="back-link">← Return to Base</a>
        <h1>Login</h1>
        <p>Sign in to access your CosmoBot dashboard</p>
      </div>

      <div id="registered-banner" class="alert alert--info hidden">
        Registration complete. Sign in with your credentials.
      </div>

      <div class="glass-panel panel-narrow p-6 p-sm-8 p-lg-10">
        <div class="glass-panel-corner" aria-hidden="true"></div>
        <div class="glass-panel-inner">

          <!-- Login form -->
          <form id="login-form" class="form-stack" novalidate>
            <div class="field-wrap" data-field="email">
              <div class="field-box">
                <input id="email" type="email" placeholder=" " autocomplete="email" required />
                <label for="email">Email ID <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="email"></p>
            </div>

            <div class="field-wrap" data-field="password">
              <div class="field-box">
                <input id="password" type="password" placeholder=" " autocomplete="current-password" required />
                <label for="password">Password <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="password"></p>
            </div>

            <div style="text-align:right">
              <button type="button" id="show-reset-btn" class="text-link-btn">
                Forgot Password / Reset Account →
              </button>
            </div>

            <div id="server-error" class="alert alert--error hidden"></div>

            <div class="form-span-2 form-footer">
              <div style="display:flex;gap:0.5rem;align-items:center;">
                <a href="index.html" class="btn-panel btn-panel--purple" id="return-btn">
                  <span class="btn-panel-dot"></span> Return
                </a>
                <button type="submit" id="login-btn" class="btn-panel btn-panel--cyan btn-full">
                  <span class="btn-panel-corner-tr"></span>
                  <span class="btn-panel-corner-bl"></span>
                  <span class="btn-panel-dot"></span> Sign In
                </button>
              </div>
              <p class="form-note" style="text-align:center">
                New user? <a href="register.html" class="link-purple">Register</a>
              </p>
            </div>
          </form>

          <!-- Reset form -->
          <div id="reset-view" class="hidden">
            <div class="reset-divider">
              <span></span>
              <p>Reset Password</p>
              <span></span>
            </div>

            <form id="reset-form" class="form-stack">
              <div class="field-wrap">
                <div class="field-box">
                  <input id="reset-email" type="email" placeholder=" " autocomplete="email" required />
                  <label for="reset-email">Recovery Email</label>
                </div>
              </div>

              <p id="reset-error" class="field-error hidden"></p>
              <p id="reset-message" class="alert alert--info hidden" style="margin-bottom:0"></p>

              <button type="submit" id="reset-btn" class="btn-panel btn-panel--purple btn-full">
                <span class="btn-panel-dot"></span> Send Reset Link
              </button>
              <button type="button" id="back-login-btn" class="text-link-btn">← Back to Login</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="js/spaceCanvas.js"></script>
  <script src="js/authService.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
