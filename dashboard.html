<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="cosmobot.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Dashboard — CosmoBot</title>
</head>
<body>
  <div class="page">
    <canvas id="space-canvas" aria-hidden="true"></canvas>

    <div class="page-center">
      <div id="no-session" class="glass-panel panel-narrow p-8 hidden">
        <div class="glass-panel-inner" style="text-align:center">
          <p style="color:rgba(255,255,255,0.6)">Session expired. Please authenticate.</p>
          <a href="login.html" class="btn-panel btn-panel--cyan mt-8" style="margin-top:1.5rem;display:inline-flex">
            <span class="btn-panel-dot"></span> Login
          </a>
        </div>
      </div>

      <div id="dashboard" class="glass-panel panel-narrow p-8 hidden">
        <div class="glass-panel-corner" aria-hidden="true"></div>
        <div class="glass-panel-inner">
          <p class="terminal-tag">Session Active</p>
          <h2 class="dashboard-title">Welcome, <span id="user-name"></span></h2>
          <div class="profile-list">
            <p><span>UID:</span> <span id="user-uid"></span></p>
            <p><span>Linked Companion:</span> <span id="user-device"></span></p>
          </div>
          <a href="login.html" id="logout-btn" class="btn-panel btn-panel--purple mt-8" style="margin-top:2rem;display:inline-flex">
            <span class="btn-panel-dot"></span> Disconnect
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="js/spaceCanvas.js"></script>
  <script src="js/authService.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
