<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="cosmobot.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>Register — CosmoBot</title>
</head>
<body>
  <div class="page">
    <canvas id="space-canvas" aria-hidden="true"></canvas>
    <div class="cyber-grid" aria-hidden="true"></div>

    <div class="page-center">
      <div class="page-heading">
        <a href="index.html" class="back-link">← Return to Base</a>
        <h1>Register</h1>
        <p>Create your CosmoBot account</p>
      </div>

      <div class="glass-panel panel-wide p-6 p-sm-8 p-lg-10">
        <div class="glass-panel-corner" aria-hidden="true"></div>
        <div class="glass-panel-inner">

          <div id="success-view" class="success-state hidden">
            <div class="success-icon">✓</div>
            <h2>Registration Successful</h2>
            <p>Redirecting to login...</p>
          </div>

          <form id="register-form" class="form-grid" novalidate>
            <div class="form-span-2 field-wrap" data-field="name">
              <div class="field-box">
                <input id="name" type="text" placeholder=" " autocomplete="name" required />
                <label for="name">User Name <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="name"></p>
            </div>

            <div class="form-span-2 field-wrap" data-field="email">
              <div class="field-box">
                <input id="email" type="email" placeholder=" " autocomplete="email" required />
                <label for="email">Email ID <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="email"></p>
            </div>

            <div class="field-wrap" data-field="password">
              <div class="field-box">
                <input id="password" type="password" placeholder=" " autocomplete="new-password" required />
                <label for="password">Password <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="password"></p>
            </div>

            <div class="field-wrap" data-field="confirmPassword">
              <div class="field-box">
                <input id="confirmPassword" type="password" placeholder=" " autocomplete="new-password" required />
                <label for="confirmPassword">Confirm Password <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="confirmPassword"></p>
            </div>

            <!-- School removed per updated requirements -->

            <div class="field-wrap" data-field="age">
              <div class="field-box">
                <input id="age" type="number" placeholder=" " min="0" max="100" required />
                <label for="age">Age <span style="color:var(--neon-cyan)">*</span></label>
              </div>
              <p class="field-error hidden" data-error="age"></p>
            </div>

            <!-- Grade removed per updated requirements -->

            <div id="server-error" class="form-span-2 alert alert--error hidden"></div>

            <div class="form-span-2 form-footer">
              <div style="display:flex;gap:0.5rem;align-items:center;">
                <a href="index.html" class="btn-panel btn-panel--cyan" id="return-btn">
                  <span class="btn-panel-dot"></span> Return
                </a>
                <button type="submit" id="submit-btn" class="btn-panel btn-panel--purple btn-full">
                  <span class="btn-panel-corner-tr"></span>
                  <span class="btn-panel-corner-bl"></span>
                  <span class="btn-panel-dot"></span> Complete Registration
                </button>
              </div>
              <p class="form-note">
                Already registered? <a href="login.html" class="link-cyan">Login</a>
              </p>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="js/spaceCanvas.js"></script>
  <script src="js/authService.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
